name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets for release
        run: pnpm run build

      - name: Commit build artifacts and move tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/build/ -f
          if git diff --staged --quiet; then
            echo "No build artifacts to commit"
            exit 0
          fi
          git commit -m "chore: include compiled assets for ${{ github.ref_name }}"
          # Mirror to a release branch for traceability
          git push origin HEAD:refs/heads/release/${{ github.ref_name }}
          # Move the tag onto the build commit so Composer consumers (^x.y.z)
          # pull a ref that contains public/build/.
          git tag -f "${{ github.ref_name }}"
          git push origin "refs/tags/${{ github.ref_name }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            public/build/**
